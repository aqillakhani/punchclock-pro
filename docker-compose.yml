services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: punchclock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: punchclock
      POSTGRES_USER: punchclock
      POSTGRES_PASSWORD: punchclock
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/home/postgres/pgdata/data
      - ./packages/api/src/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U punchclock -d punchclock"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: punchclock-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
